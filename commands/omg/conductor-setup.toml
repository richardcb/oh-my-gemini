# /omg:conductor-setup - Redirects to /omg:setup

description = "Initialize the Conductor workflow. Redirects to /omg:setup which handles full project initialization including Conductor."

prompt = """
The `/omg:conductor-setup` command has been consolidated into `/omg:setup`.

Please run `/omg:setup` instead. It handles full project initialization including:
- GEMINI.md creation
- Conductor workflow setup (product.md, tech-stack.md, workflow.md, tracks.md)
- Hook configuration overview

If you only need Conductor and already have the rest set up, `/omg:setup` will
detect existing configuration and skip what's already done.
"""

[tool_config]
mode = "AUTO"
