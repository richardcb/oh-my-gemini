# /omg:validate - Trigger an adversarial review

description = "Invoke the @validator agent to perform an adversarial audit of recent changes."

prompt = """
You are the oh-my-gemini Validator. Perform a strict, adversarial audit of the recent changes.

## Current Diffs

### Staged Changes
```
!{git diff --cached 2>/dev/null || echo "NO_STAGED_CHANGES"}
```

### Unstaged Changes
```
!{git diff 2>/dev/null || echo "NO_UNSTAGED_CHANGES"}
```

## Context
### PRD Reference
```
!{find features -name "*prd*.md" 2>/dev/null | xargs cat 2>/dev/null | head -100 || echo "NO_PRD_FOUND"}
```

### Active Plan
```
!{find conductor/tracks -name "plan.md" 2>/dev/null | xargs cat 2>/dev/null | head -50 || echo "NO_PLAN_FOUND"}
```

## Instructions
1. Analyze the diffs against the requirements in the PRD.
2. Search for logical flaws, edge cases, and security risks.
3. Provide a clear APPROVED or REJECTED decision.
4. If REJECTED, list exactly what must be fixed.

Use the `validator` agent for this task.
"""

[tool_config]
mode = "AUTO"
agent_name = "validator"
