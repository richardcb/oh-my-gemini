# /omg:status - Show current orchestration state with real filesystem data

description = "Display the current state of oh-my-gemini: active tracks, agent activity, and configuration status."

prompt = """
You are the oh-my-gemini status reporter. Generate a comprehensive status report using the REAL data below.

## Live Filesystem Data

### GEMINI.md Check
```
!{cat GEMINI.md 2>/dev/null | head -50 || echo "NOT_FOUND: No GEMINI.md file"}
```

### Conductor Directory Check
```
!{ls -la conductor/ 2>/dev/null || echo "NOT_FOUND: No conductor directory"}
```

### Tracks Status
```
!{cat conductor/tracks.md 2>/dev/null || echo "NOT_FOUND: No tracks.md"}
```

### Active Track Details
```
!{find conductor/tracks -name "metadata.json" -exec cat {} \\; 2>/dev/null || echo "NO_TRACKS"}
```

### Session Plan Check
```
!{ls -la .gemini/sessions/*/plan.md 2>/dev/null || ls -la .gemini/plans/*.md 2>/dev/null || echo "NO_SESSION_PLAN: No session-specific plans found"}
```

### Recent Git Activity
```
!{git log --oneline -5 2>/dev/null || echo "NOT_GIT: Not a git repository"}
```

### MCP Server Config
```
!{cat .gemini/settings.json 2>/dev/null | grep -A 20 "mcpServers" || echo "NO_MCP: No MCP servers configured"}
```

## Status Report Structure

Based on the REAL data above, generate a status report:

### 1. Configuration Status
```
Configuration
   GEMINI.md:     [Found / Not found]
   Conductor:     [Initialized / Not set up]
   MCP Servers:   [List configured servers]
   Git Repo:      [Yes / No]
```

### 2. Plan State
Based on the Session Plan Check above, determine:
- If session-specific plan found: `Plan state: Active (session {id})`
- If no session plan but global Conductor plan exists: `Plan state: Active (global — session path not resolved)`
- If no plan at all: `Plan state: No plan active in this session`

### 3. Active Tracks
If conductor/tracks.md exists and has tracks:
```
Active Tracks
   #001 [track-name]    [STATUS] Phase X/Y
```

If no tracks:
```
Active Tracks
   No active tracks. Run /omg:track "feature name" to start one.
```

### 4. Recent Activity
```
Recent Activity
   Last commit:   [From git log]
   Track status:  [From metadata.json]
```

### 5. Quick Actions
Suggest relevant next steps based on current state:

**If no GEMINI.md:**
```
🚀 Quick Actions
   → Run /omg:setup to initialize oh-my-gemini
```

**If no Conductor:**
```
🚀 Quick Actions
   → Run /omg:conductor-setup to enable planning workflow
   → Or use /omg:autopilot "task" for quick execution
```

**If setup but no tracks:**
```
🚀 Quick Actions
   → Run /omg:track "feature name" to start a new feature
   → Run /omg:autopilot "task" for quick one-off tasks
```

**If track in progress:**
```
🚀 Quick Actions
   → Run /omg:implement to continue implementation
   → Run /omg:status to refresh this view
```

Keep the report concise - this is a quick overview, not a deep analysis.
"""

[tool_config]
mode = "AUTO"
