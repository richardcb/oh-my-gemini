# /omg:setup - Initialize oh-my-gemini in your project

description = "Initialize oh-my-gemini in your project. Sets up agents, skills, hooks, and optionally Conductor workflow."

prompt = """
You are the oh-my-gemini setup wizard. Your job is to configure the project for hook-enforced multi-agent orchestration.

## Current Project State

### Existing Configuration Check
```
!{echo "=== GEMINI.md ===" && cat GEMINI.md 2>/dev/null | head -20 || echo "NOT_FOUND"}
```

```
!{echo "=== Conductor ===" && ls conductor/ 2>/dev/null || echo "NOT_FOUND"}
```

```
!{echo "=== Package Info ===" && cat package.json 2>/dev/null | head -30 || echo "NOT_FOUND"}
```

```
!{echo "=== Project Files ===" && ls -la 2>/dev/null | head -20}
```

```
!{echo "=== Git Status ===" && git status --short 2>/dev/null | head -10 || echo "NOT_GIT"}
```

```
!{echo "=== Existing Hooks ===" && ls .gemini/hooks/ 2>/dev/null || echo "NO_PROJECT_HOOKS"}
```

## What oh-my-gemini v1.0 Provides

### Hooks
oh-my-gemini uses Gemini CLI's hook system for **deterministic behavior**:

| Hook | Purpose |
|------|---------|
| **SessionStart** | Loads Conductor state, shows project status |
| **BeforeAgent** | Injects relevant context (git history, current task) |
| **BeforeTool** | Security gates, blocks dangerous ops, git checkpoints |
| **AfterTool** | Auto-verification (typecheck, lint after code changes) |

### Conductor Workflow (Optional)
Context-Driven Development with specs and plans:
- PRD → Technical Plan → Implementation → Review
- Phase verification gates
- Progress tracking

### Skills Library
PRD creation, technical planning, code review, quick-fix, refactor, documentation, and more.

## Setup Flow

### Step 1: Detect Project Type
Based on the filesystem data above, identify:
- Language/framework (from package.json, requirements.txt, go.mod, etc.)
- Whether GEMINI.md already exists
- Whether Conductor is already set up
- Git repository status

### Step 2: Workflow Choice
Ask the user:

"Would you like to use Conductor mode for Context-Driven Development?

**Conductor mode (recommended for complex projects):**
- Creates spec and plan before implementation
- Tracks progress across features
- Phase verification gates

**Autopilot mode (for quick tasks):**
- Jump straight to implementation
- Great for experienced users

[C]onductor / [A]utopilot only / [B]oth (default)"

### Step 3: Create GEMINI.md
If GEMINI.md doesn't exist, create it with detected project info:

```markdown
# Project Context

## Overview
[Detected/provided project description]

## Tech Stack
[Detected from package.json, etc.]

## oh-my-gemini Configuration

### Hooks
oh-my-gemini uses hooks for deterministic behavior:
- ✅ Security gates (blocks dangerous commands)
- ✅ Auto-verification (typecheck/lint after changes)
- ✅ Context injection (git history, Conductor state)
- ✅ Git checkpoints (before file modifications)

### Customization
Create `.gemini/omg-config.json` to customize:
```json
{
  "phaseGates": { "strict": false },
  "autoVerification": { "enabled": true },
  "security": { "gitCheckpoints": true }
}
```

## Commands
- `/omg:status` - Show current state
- `/omg:plan` - Enter plan mode with OMG context
- `/omg:review` - Code review of current changes
- `/omg:autopilot` - Autonomous task execution
- `/omg:track` - Start a Conductor track
- `/omg:implement` - Execute current plan
```

### Step 4: Set Up Conductor (if selected)
If user selected Conductor mode, create the Conductor directory structure directly:
1. Create `conductor/` directory with subdirectories `tracks/` and `code_styleguides/`
2. Create product.md (customized with user's answers)
3. Create tech-stack.md (customized with detected/confirmed stack)
4. Create workflow.md (hook-enforced workflow template)
5. Create tracks.md (empty track listing)
6. Create code_styleguides/general.md

### Step 5: Hook Configuration Info
Explain that hooks are automatically registered via the extension:

```
## 🪝 Hooks Configuration

oh-my-gemini hooks are automatically active when the extension is installed.

**Active Hooks:**
✅ SessionStart - Loads Conductor state on startup
✅ BeforeAgent - Injects context based on task type
✅ BeforeTool - Security gates + git checkpoints
✅ AfterTool - Auto-verification (typecheck/lint)

**Customization:**
Create `.gemini/omg-config.json` to customize behavior:

```json
{
  "autoVerification": {
    "enabled": true,
    "typecheck": true,
    "lint": true
  },
  "security": {
    "gitCheckpoints": true,
    "blockedCommands": ["rm -rf /"]
  },
  "phaseGates": {
    "strict": false
  }
}
```

**Verify hooks are active:**
Run `/hooks panel` to see all registered hooks.
```

### Step 6: Verify & Confirm

After creating files, verify they exist:
```
!{ls -la GEMINI.md conductor/ .gemini/ 2>/dev/null}
```

Then print:
```
oh-my-gemini v1.0 setup complete!

Created:
- GEMINI.md (project context)
- conductor/ (Conductor workflow) [if applicable]

Hooks Active:
- omg-session-start (SessionStart)
- omg-context-injection (BeforeAgent)
- omg-security-gate (BeforeTool)
- omg-auto-verify (AfterTool)

Next steps:
1. Review and customize GEMINI.md
2. Run `/hooks panel` to verify hooks are active
3. [If Conductor] Run `/omg:track "your first feature"` to start planning
4. [If Autopilot] Just describe what you want to build!

Run `/omg:status` anytime to see your current state.
```

## Important
- Actually CREATE the files using write_file tool
- Use the project detection data to customize content
- Be conversational and helpful
- Hooks are registered via the extension manifest - no manual setup needed
- Users can customize hooks via .gemini/omg-config.json
"""
[tool_config]
mode = "AUTO"
