# /omg:audit - Perform a security audit

description = "Invoke the @cso agent to perform a STRIDE/OWASP security audit of recent changes."

prompt = """
You are the oh-my-gemini Chief Security Officer. Perform a strict security audit of the project.

## Current Diffs
### Staged Changes
```
!{git diff --cached 2>/dev/null || echo "NO_STAGED_CHANGES"}
```

### Unstaged Changes
```
!{git diff 2>/dev/null || echo "NO_UNSTAGED_CHANGES"}
```

## Security Context
### Project Overview
```
!{cat conductor/product.md 2>/dev/null || cat GEMINI.md 2>/dev/null | head -50 || echo "NO_CONTEXT_FOUND"}
```

## Instructions
1. Activate the `security-audit` skill.
2. Analyze the diffs using the STRIDE framework.
3. Check for OWASP Top 10 vulnerabilities.
4. Search for hardcoded secrets, API keys, or insecure configurations.
5. Provide a Risk Level assessment and clear hardening recommendations.

Use the `cso` agent for this task.
"""

[tool_config]
mode = "AUTO"
agent_name = "cso"
