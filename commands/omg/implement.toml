# /omg:implement - Execute the current track's plan

description = "Execute the current track's plan, working through tasks phase by phase."

prompt = """
You are executing a Conductor track's implementation plan.

## Current State

### Active Tracks
```
!{cat conductor/tracks.md 2>/dev/null || echo "NO_TRACKS"}
```

### Track Directories
```
!{ls -la conductor/tracks/ 2>/dev/null || echo "NO_TRACK_DIRS"}
```

### Find Active Track
```
!{find conductor/tracks -name "metadata.json" -exec cat {} + 2>/dev/null | head -50 || echo "NO_METADATA"}
```

### Active Track Plan
```
!{find conductor/tracks -name "plan.md" -exec cat {} + 2>/dev/null | head -100 || echo "NO_PLAN"}
```

### Project Context
```
!{cat GEMINI.md 2>/dev/null | head -50 || echo "NO_GEMINI_MD"}
```

### Tech Stack
```
!{cat conductor/tech-stack.md 2>/dev/null | head -30 || echo "NO_TECH_STACK"}
```

## Hooks Working For You

oh-my-gemini v2.0 hooks handle verification automatically:

| Hook | What It Does |
|------|-------------|
| **AfterTool** | Runs typecheck/lint after code changes |
| **phase-gate** | Detects phase completion, prompts verification |
| **ralph-retry** | Retries on failure if persistence mode active |

You don't need to manually verify - hooks inject feedback.

## Implementation Process

### Step 1: Identify Active Track
From the metadata files above:
1. Find tracks where `status` is NOT "complete"
2. If multiple active tracks, ask user which one
3. If no active tracks, suggest running `/omg:track` first

### Step 2: Find Current Task
1. Parse the plan.md file
2. Find the first task marked `[ ]` (incomplete)
3. Identify which phase it's in

### Step 3: Execute Tasks
For each task:
1. Understand what's needed from the task description
2. Check existing code patterns if needed
3. Implement the change
4. The AfterTool hook verifies automatically
5. If errors, fix them (errors injected into context)

### Step 4: Update Status
After completing a task:
1. Mark it `[x]` in plan.md using str_replace
2. Show progress:
   ```
   📍 Track: [Feature Name]
   📋 Phase: [Phase N] - [Phase Name]
   ✅ Completed: [Task description]
   ⏭️  Next: [Next task]
   ```

### Step 5: Phase Gates
The phase-gate hook detects when you complete a phase.

**Advisory mode (default):**
- Shows a message suggesting verification
- You can continue if appropriate

**Strict mode (if user configured):**
- Requires explicit verification
- Lists what to check before proceeding

When you reach a phase boundary:
1. Summarize what was accomplished
2. List files changed
3. Note any issues or deviations
4. Ask if user wants to proceed

### Step 6: Handle Completion
When all tasks are done:
1. Update track status to "complete" in metadata.json
2. Update tracks.md to show `[x]`
3. Print summary:
   ```
   ## 🎉 Implementation Complete: [Feature Name]
   
   ### All Phases Completed
   - [x] Phase 1: Data Layer
   - [x] Phase 2: Backend API
   - [x] Phase 3: Frontend
   - [x] Phase 4: Review
   
   ### Next Steps
   - Consider running code review
   - Update documentation if needed
   ```

## Error Handling

### If a task fails:
1. The AfterTool hook injects errors into context
2. Read the errors and fix them
3. Continue with the task

### If stuck (with ralph/persistent keyword):
1. The ralph-retry hook activates
2. It suggests alternative approaches
3. Keep trying up to max retries

### If blocked on missing info:
1. Document what's missing
2. Ask user for clarification
3. Don't proceed with assumptions on critical decisions

## Guidelines

- Follow task order within phases
- The phase-gate hook handles verification prompts
- Update plan.md as you complete tasks
- Match existing codebase patterns
- Trust the hooks for safety and verification
"""
[tool_config]
mode = "AUTO"
