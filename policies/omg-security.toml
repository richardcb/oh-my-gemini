# oh-my-gemini Security Policies (v0.31.0 aligned)
#
# Static security rules for the Gemini CLI Policy Engine.
# These rules are evaluated by the native policy engine for better performance
# and compatibility with enterprise admin tier policies.
#
# v0.30.0: All rules now use commandRegex (commandPrefix deprecated).
# Dynamic, context-aware checks remain in hooks/before-tool.js.
#
# Priority Guide:
#   0-99:   Low priority (can be overridden easily)
#   100-499: Standard priority
#   500-999: High priority (rarely overridden)

# =============================================================================
# DANGEROUS SHELL COMMANDS - DENY
# =============================================================================

# Block recursive force delete of root/home directories
[[rule]]
toolName = "run_shell_command"
commandRegex = "^rm\\s+-rf\\s+[/~.]"
decision = "deny"
priority = 900
deny_message = "Blocked: Recursive force delete of critical directories is not allowed."

# Block sudo rm commands
[[rule]]
toolName = "run_shell_command"
commandRegex = "sudo\\s+rm"
decision = "deny"
priority = 900
deny_message = "Blocked: Elevated privilege recursive delete is not allowed."

# Block chmod 777 on paths (insecure permissions)
[[rule]]
toolName = "run_shell_command"
commandRegex = "chmod\\s+(-R\\s+)?777\\s+/"
decision = "deny"
priority = 800
deny_message = "Blocked: Setting 777 permissions on system paths is a security risk."

# Block fork bomb
[[rule]]
toolName = "run_shell_command"
commandRegex = "^:\\(\\)\\{\\s*:\\|:&\\s*\\};:"
decision = "deny"
priority = 950
deny_message = "Blocked: Fork bomb detected."

# Block disk device overwrites
[[rule]]
toolName = "run_shell_command"
commandRegex = ">(\\s*)/dev/(sd|hd|nvme)"
decision = "deny"
priority = 950
deny_message = "Blocked: Direct disk device writes are not allowed."

# Block mkfs (filesystem formatting)
[[rule]]
toolName = "run_shell_command"
commandRegex = "^mkfs\\."
decision = "deny"
priority = 950
deny_message = "Blocked: Filesystem formatting is not allowed."

# Block dd to device
[[rule]]
toolName = "run_shell_command"
commandRegex = "dd\\s+.*of=/dev/"
decision = "deny"
priority = 950
deny_message = "Blocked: dd writes to device are not allowed."

# Block piping curl/wget to shell (common malware pattern)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(curl|wget).*\\|\\s*(ba)?sh"
decision = "deny"
priority = 800
deny_message = "Blocked: Piping remote content directly to shell is risky. Download first, review, then execute."

# =============================================================================
# WINDOWS-SPECIFIC DANGEROUS COMMANDS - DENY
# =============================================================================

# Block format drive commands (Windows)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^format\\s+[a-z]:"
decision = "deny"
priority = 950
deny_message = "Blocked: Drive formatting is not allowed."

# Block recursive directory delete (Windows rd /s /q)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^(rd|rmdir)\\s+/s\\s+/q\\s+[a-z]:\\\\"
decision = "deny"
priority = 900
deny_message = "Blocked: Recursive directory delete of drive root is not allowed."

# Block force delete of system files (Windows del /f /q)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^del\\s+/f\\s+.*([a-z]:\\\\windows|%systemroot%|%programfiles%)"
decision = "deny"
priority = 900
deny_message = "Blocked: Deleting system files is not allowed."

# Block registry deletion (Windows)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^reg\\s+delete\\s+hk"
decision = "deny"
priority = 900
deny_message = "Blocked: Registry deletion is not allowed."

# Block bcdedit (boot configuration, Windows)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^bcdedit"
decision = "deny"
priority = 900
deny_message = "Blocked: Boot configuration changes are not allowed."

# Block diskpart (disk partitioning, Windows)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^diskpart"
decision = "deny"
priority = 900
deny_message = "Blocked: Disk partitioning is not allowed."

# Block forced shutdown/restart (Windows)
[[rule]]
toolName = "run_shell_command"
commandRegex = "(?i)^shutdown\\s+/[rs]"
decision = "deny"
priority = 800
deny_message = "Blocked: System shutdown/restart commands are not allowed."

# =============================================================================
# PROTECTED PATHS - DENY WRITES
# =============================================================================

# Block writes to node_modules
[[rule]]
toolName = ["write_file", "replace"]
commandRegex = "node_modules"
decision = "deny"
priority = 700
deny_message = "Protected: Cannot write to node_modules. Use npm/yarn to manage dependencies."

# Block writes to .git directory
[[rule]]
toolName = ["write_file", "replace"]
commandRegex = "\\.git[/\\\\]"
decision = "deny"
priority = 700
deny_message = "Protected: Cannot write directly to .git directory. Use git commands instead."

# Block writes to system directories (Unix)
[[rule]]
toolName = ["write_file", "replace"]
commandRegex = "\"path\":\\s*\"/(etc|usr|var|bin|sbin|boot|root)/"
decision = "deny"
priority = 800
deny_message = "Protected: Cannot write to system directories."

# Block writes to Windows system directories
[[rule]]
toolName = ["write_file", "replace"]
commandRegex = "(?i)(C:\\\\Windows|C:\\\\Program Files|%SystemRoot%|%ProgramFiles%)"
decision = "deny"
priority = 800
deny_message = "Protected: Cannot write to Windows system directories."

# =============================================================================
# SAFE READ OPERATIONS - ALLOW
# =============================================================================

# Allow read operations automatically (they're safe)
[[rule]]
toolName = ["read_file", "list_directory", "glob", "search_file_content", "read_many_files"]
decision = "allow"
priority = 100

# =============================================================================
# GIT STATUS/LOG - ALLOW (common safe operations)
# =============================================================================

[[rule]]
toolName = "run_shell_command"
commandRegex = "^git\\s+(status|log|diff|branch|show)\\b"
decision = "allow"
priority = 200

# =============================================================================
# AGENT MODE RESTRICTIONS - MIGRATION NOTE
# =============================================================================
#
# The following tool restrictions are enforced DYNAMICALLY by hooks/tool-filter.js
# because they depend on runtime prompt content (e.g., @researcher, @architect keywords).
# As of v0.31.0, tool annotation matching (#20029) and policy chains (#19991)
# may enable migrating some of this logic to TOML. For now, these remain dynamic.
#
# Researcher mode (activated by @researcher keyword):
#   Allowed: google_web_search, web_fetch, read_file, list_directory, glob
#   Denied:  write_file, replace, run_shell_command
#
# Architect mode (activated by @architect keyword):
#   Allowed: read_file, list_directory, glob, search_file_content
#   Denied:  write_file, replace, run_shell_command
#
# Executor mode (default / activated by @executor keyword):
#   Allowed: all tools (with security rules above still enforced)
#
# TODO: If the policy engine adds conditional/context-aware rules in a future
# Gemini CLI release, migrate these restrictions from tool-filter.js to TOML.
