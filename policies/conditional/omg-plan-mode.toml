# oh-my-gemini Plan Mode Policy — Complement to native plan.toml
#
# As of Gemini CLI v0.31.0, native plan mode (packages/core/src/policy/policies/plan.toml)
# handles all read-only enforcement:
#   - Blocks write_file, replace, run_shell_command via catch-all DENY (priority 60)
#   - Allows read_file, list_directory, glob, grep_search, google_web_search (priority 70)
#
# This extension policy ONLY fills gaps in native enforcement.
# See: PR #20178 (centralized plan mode tool visibility in policy engine)

# =============================================================================
# GAP: web_fetch is NOT in the native plan.toml allow list
# =============================================================================
# Native plan.toml's catch-all DENY at priority 60 blocks web_fetch because it
# is not explicitly allowed and does not carry readOnlyHint=true annotation.
# oh-my-gemini considers web_fetch essential for research during planning.

[[rule]]
toolName = ["web_fetch"]
decision = "allow"
priority = 600
modes = ["plan"]
